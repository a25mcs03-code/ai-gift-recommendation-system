<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AI Gift Recommendation</title>

<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="container">

<div class="left">

<h1>🎁 AI Gift Recommendation System</h1>

<p>
Find the perfect gift for your loved ones using Artificial Intelligence.
</p>

<img src="https://cdn-icons-png.flaticon.com/512/3159/3159066.png">

</div>

<div class="right">

<form>

<h2>Login</h2>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Email Address" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="Password" required>
</div>

<button>Login</button>

<p class="forgot">
<a href="#">Forgot Password?</a>
</p>

<hr>

<p>
New User?
<a href="register.html">Create Account</a>
</p>

</form>

</div>

</div>

</body>
</html>
